name: Tavern CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: latest
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: uv sync --frozen --dev
      - name: Run pytest
        run: uv run pytest tests/test_workbench_api.py tests/test_plugin_system.py tests/test_agent_config.py tests/test_hygiene_guards.py

  web:
    name: Web typecheck and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install web dependencies
        run: npm ci
      - name: Typecheck and build
        run: npm run ci
