services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    environment:
      PYTHONPATH: ${PYTHONPATH:-/app}
      PYTHONUTF8: "${PYTHONUTF8:-1}"
      PYTHONIOENCODING: ${PYTHONIOENCODING:-utf-8}
      TAVERN_APP_NAME: ${TAVERN_APP_NAME:-Tavern LiveOS}
      TAVERN_ENV: ${TAVERN_ENV:-docker}
      TAVERN_LOG_LEVEL: ${TAVERN_LOG_LEVEL:-INFO}
      TAVERN_WORKSPACE_ROOT: ${TAVERN_WORKSPACE_ROOT:-/app}
      TAVERN_STORAGE_BACKEND: ${TAVERN_STORAGE_BACKEND:-file}
      TAVERN_TTS_PROVIDER: ${TAVERN_TTS_PROVIDER:-placeholder}
      TAVERN_MVP_TTS_PROVIDER: ${TAVERN_MVP_TTS_PROVIDER:-cosyvoice_tts}
      TAVERN_TTS_FALLBACK_PROVIDER: ${TAVERN_TTS_FALLBACK_PROVIDER:-edge_tts}
      TAVERN_COSYVOICE_BASE_URL: ${TAVERN_COSYVOICE_BASE_URL:-}
      TAVERN_COSYVOICE_HEALTH_PATH: ${TAVERN_COSYVOICE_HEALTH_PATH:-}
      TAVERN_COSYVOICE_SPEECH_PATH: ${TAVERN_COSYVOICE_SPEECH_PATH:-/v1/audio/speech}
      TAVERN_COSYVOICE_MODEL: ${TAVERN_COSYVOICE_MODEL:-CosyVoice2-0.5B}
      TAVERN_COSYVOICE_VOICE: ${TAVERN_COSYVOICE_VOICE:-中文女声}
      TAVERN_COSYVOICE_FORMAT: ${TAVERN_COSYVOICE_FORMAT:-wav}
      TAVERN_COSYVOICE_TIMEOUT_SECONDS: ${TAVERN_COSYVOICE_TIMEOUT_SECONDS:-120}
      TAVERN_TTS_OUTPUT_DIR: ${TAVERN_TTS_OUTPUT_DIR:-.working_dir/artifacts/tts}
      TAVERN_CORS_ORIGINS: "${TAVERN_CORS_ORIGINS:-*}"
      DATABASE_URL: ${DATABASE_URL:-postgresql://tavern:tavern@postgres:5432/tavern}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://tavern:tavern@rabbitmq:5672/}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-tavern}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-tavern-secret}
    ports:
      - "8770:8770"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio
    volumes:
      - ../../.working_dir:/app/.working_dir

  web:
    build:
      context: ../..
      dockerfile: infra/docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://127.0.0.1:8770}
      TAVERN_API_BASE_INTERNAL: ${TAVERN_API_BASE_INTERNAL:-http://api:8770}
    ports:
      - "5180:5180"
    depends_on:
      - api

  n8n:
    image: n8nio/n8n:${N8N_IMAGE_TAG:-latest}
    environment:
      N8N_LISTEN_ADDRESS: ${N8N_LISTEN_ADDRESS:-0.0.0.0}
      N8N_HOST: ${N8N_HOST:-127.0.0.1}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://127.0.0.1:5678/}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://127.0.0.1:5678/}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-tavern-local-dev-change-me}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-tavern}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-tavern-n8n-local}
      N8N_DIAGNOSTICS_ENABLED: ${N8N_DIAGNOSTICS_ENABLED:-false}
      N8N_PERSONALIZATION_ENABLED: ${N8N_PERSONALIZATION_ENABLED:-false}
      N8N_VERSION_NOTIFICATIONS_ENABLED: ${N8N_VERSION_NOTIFICATIONS_ENABLED:-false}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Shanghai}
      TZ: ${TZ:-Asia/Shanghai}
      TAVERN_API_BASE_INTERNAL: ${TAVERN_API_BASE_INTERNAL:-http://api:8770}
    ports:
      - "127.0.0.1:5678:5678"
    depends_on:
      - api
    volumes:
      - n8n-data:/home/node/.n8n
      - ../../workflows/n8n:/opt/tavern/workflows/n8n:ro
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5678/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    command: ["uv", "run", "python", "-m", "apps.api.app.workers.main"]
    environment:
      PYTHONPATH: ${PYTHONPATH:-/app}
      TAVERN_ENV: ${TAVERN_ENV:-docker}
      TAVERN_LOG_LEVEL: ${TAVERN_LOG_LEVEL:-INFO}
      TAVERN_WORKSPACE_ROOT: ${TAVERN_WORKSPACE_ROOT:-/app}
      TAVERN_STORAGE_BACKEND: ${TAVERN_STORAGE_BACKEND:-file}
      TAVERN_MVP_TTS_PROVIDER: ${TAVERN_MVP_TTS_PROVIDER:-cosyvoice_tts}
      TAVERN_TTS_FALLBACK_PROVIDER: ${TAVERN_TTS_FALLBACK_PROVIDER:-edge_tts}
      TAVERN_COSYVOICE_BASE_URL: ${TAVERN_COSYVOICE_BASE_URL:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://tavern:tavern@postgres:5432/tavern}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://tavern:tavern@rabbitmq:5672/}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio
    profiles:
      - workers

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tavern}
      POSTGRES_USER: ${POSTGRES_USER:-tavern}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tavern}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-tavern}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-tavern}
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tavern}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tavern-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
  n8n-data:
