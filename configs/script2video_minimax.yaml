# 使用 MiniMax 作为 chat model provider 的示例配置。
# MiniMax M3 通过其 OpenAI-compatible API 使用。
#
# 在下方填写 API key，或在环境中导出 MINIMAX_API_KEY。
# 可用 models：
#   - MiniMax-M3             （最新，推荐）
#   - MiniMax-M2.7           （上一代）
#   - MiniMax-M2.7-highspeed （高速变体）

chat_model:
  init_args:
    model: MiniMax-M3
    model_provider: minimax
    api_key:  # 留空则使用 MINIMAX_API_KEY 环境变量
    # base_url 会自动解析为 https://api.minimax.io/v1
  max_requests_per_minute: null
  max_requests_per_day: null

image_generator:
  class_path: tools.ImageGeneratorNanobananaGoogleAPI
  init_args:
    api_key:
  max_requests_per_minute: 2
  max_requests_per_day: 50

video_generator:
  class_path: tools.VideoGeneratorVeoGoogleAPI
  init_args:
    api_key:
  max_requests_per_minute: 2
  max_requests_per_day: 50

working_dir: .working_dir/script2video
