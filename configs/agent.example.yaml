# ViMax 智能体运行时本地配置模板。
# 不要把真实密钥提交到仓库。共享环境或 CI 场景优先使用环境变量。

llm:
  # 文本 Agent 默认走 OpenAI 兼容 Responses API 中转。
  # 真实密钥请放 OPENAI_API_KEY 环境变量或 configs/agent.secrets.local.yaml，不要提交。
  model_provider: OpenAI
  model: gpt-5.5
  review_model: gpt-5.5
  model_reasoning_effort: xhigh
  base_url: https://mirror.xinshu.ai
  api_key_env: OPENAI_API_KEY
  wire_api: responses
  disable_response_storage: true
  network_access: enabled
  windows_wsl_setup_acknowledged: true

image:
  # 文本/视觉 Prompt 默认复用 OpenAI 配置；Image Agent 真实出图走 OpenAI Images API。
  model_provider: OpenAI
  model: gpt-5.5
  review_model: gpt-5.5
  model_reasoning_effort: xhigh
  base_url: https://mirror.xinshu.ai
  api_key_env: OPENAI_API_KEY
  wire_api: responses
  disable_response_storage: true
  network_access: enabled
  generation_provider: openai_image
  generation_model: gpt-image-1
  generation_size: 1024x1536
  fallback_provider: placeholder_image

video:
  # Video Agent 默认走即梦 AI；真实密钥请放 TAVERN_JIMENG_API_KEY 或火山 AK/SK 环境变量。
  model_provider: JimengAI
  model: jimeng-video
  base_url: https://visual.volcengineapi.com
  req_key: jimeng_t2v_v30
  submit_action: CVSync2AsyncSubmitTask
  result_action: CVSync2AsyncGetResult
  api_version: '2022-08-31'
  api_key_env: TAVERN_JIMENG_API_KEY
  access_key_env: TAVERN_JIMENG_ACCESS_KEY
  secret_key_env: TAVERN_JIMENG_SECRET_KEY
  network_access: enabled
  fallback_provider: placeholder_video

# 可选。仅在使用 novel2video planning 时填写。
embedding:
  model_provider: openai
  model: <YOUR_EMBEDDING_MODEL>
  base_url: <YOUR_EMBEDDING_BASE_URL>
  api_key: ''

# 可选。仅在使用 novel2video planning 时填写。
reranker:
  model: <YOUR_RERANKER_MODEL>
  base_url: <YOUR_RERANKER_BASE_URL>
  api_key: ''
