# ViMax 智能体运行时本地配置模板。
# 不要把真实密钥提交到仓库。共享环境或 CI 场景优先使用环境变量。

llm:
  # 支持的 providers：openai、claude、gemini。
  # Claude 使用官方 Anthropic SDK；OpenAI 支持兼容中转；Gemini 使用 google-genai。
  model_provider: openai
  model: <YOUR_LLM_MODEL>
  base_url: <YOUR_LLM_BASE_URL>
  api_key: ''
  wire_api: chat_completions

image:
  model: <YOUR_IMAGE_MODEL>
  base_url: <YOUR_IMAGE_BASE_URL>
  api_key: ''

video:
  model: <YOUR_VIDEO_MODEL>
  base_url: <YOUR_VIDEO_BASE_URL>
  api_key: ''

# 可选。仅在使用 novel2video planning 时填写。
embedding:
  model_provider: openai
  model: <YOUR_EMBEDDING_MODEL>
  base_url: <YOUR_EMBEDDING_BASE_URL>
  api_key: ''

# 可选。仅在使用 novel2video planning 时填写。
reranker:
  model: <YOUR_RERANKER_MODEL>
  base_url: <YOUR_RERANKER_BASE_URL>
  api_key: ''
