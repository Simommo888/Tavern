# ViMax 本地运行时配置。
# 密钥应放在 configs/agent.secrets.local.yaml（已 git-ignore）或环境变量中。
# 这个已跟踪文件不要写入真实 API key。

llm:
  model_provider: openai
  model: gpt-5.5
  review_model: gpt-5.5
  base_url: https://gpt.xinshu.ai
  wire_api: responses
  api_key: ''
  model_reasoning_effort: xhigh
  disable_response_storage: true
  network_access: enabled
  windows_wsl_setup_acknowledged: true

# 图像/视频 providers 在完整渲染前仍需要各自的兼容 API keys。
# api_key 留空时，ViMax 会读取环境变量。
image:
  api_key: ''

# 视频 agents 使用独立的 Gemini/Veo-compatible provider。
# 密钥放在 configs/agent.secrets.local.yaml 或 GEMINI_API_KEY / VIMAX_VIDEO_API_KEY 中。
video:
  model: gemini-3.1-pro
  base_url: https://gpt.xinshu.ai
  api_key: ''

# 可选真实 TTS provider。默认值可通过 TAVERN_TTS_* 环境变量覆盖。
tts:
  model: tts-1
  voice: alloy
  base_url: https://gpt.xinshu.ai/v1
  api_key: ''

# 可选。仅在使用 novel2video planning 时填写。
embedding:
  api_key: ''

reranker:
  api_key: ''

features:
  goals: true
