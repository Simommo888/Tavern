# ViMax local runtime configuration.
# Keep real API keys out of this file. Prefer environment variables:
#   VIMAX_LLM_API_KEY / OPENAI_API_KEY for the agent LLM
#   VIMAX_IMAGE_API_KEY for image generation
#   VIMAX_VIDEO_API_KEY for video generation

llm:
  model_provider: openai
  model: gpt-4o-mini
  base_url: https://api.openai.com/v1
  api_key: ''

# Image/video providers still need their own compatible API keys before full
# rendering works. Leaving api_key empty makes ViMax read environment variables.
image:
  api_key: ''

video:
  api_key: ''

# Optional. Fill these only when using novel2video planning.
embedding:
  api_key: ''

reranker:
  api_key: ''
